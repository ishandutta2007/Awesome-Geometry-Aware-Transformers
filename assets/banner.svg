<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="5" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#grad1)" rx="20" ry="20" />
  
  <!-- Geometric Abstract Shapes -->
  <path d="M 100 100 L 300 100 L 200 300 Z" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.4" />
  <circle cx="200" cy="150" r="40" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.3" />
  <rect x="800" y="100" width="200" height="200" fill="none" stroke="#fb7185" stroke-width="2" opacity="0.3" transform="rotate(45, 900, 200)" />
  
  <!-- Connection Lines (Transformer concept) -->
  <line x1="100" y1="100" x2="1100" y2="300" stroke="#fef08a" stroke-width="0.5" opacity="0.2" />
  <line x1="100" y1="300" x2="1100" y2="100" stroke="#fef08a" stroke-width="0.5" opacity="0.2" />
  
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" filter="url(#shadow)">
    Awesome Geometry-Aware
  </text>
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#38bdf8" filter="url(#shadow)">
    Transformers
  </text>
  <text x="50%" y="85%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">
    A curated list of spatial, topological, and physical inductive biases
  </text>
</svg>
